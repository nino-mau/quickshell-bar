[general]
bars = 20
framerate = 30
autosens = 1
lower_cutoff_freq = 50
higher_cutoff_freq = 12000

[input]
method = pipewire
source = auto
channels = 1

[output]
method = raw
raw_target = /dev/stdout
data_format = ascii
ascii_max_range = 1000
bar_delimiter = 59
frame_delimiter = 10

[smoothing]
noise_reduction = 77
